version: "3"

tasks:
  build:
    deps: [build:neph, build:pi]

  build:neph:
    dir: neph-cli
    cmds:
      - npm install --ignore-scripts
      - npm run build

  build:pi:
    dir: pi
    cmds:
      - npm install --ignore-scripts
      - npm run build

  test:
    deps: [test:neph, test:pi]

  test:neph:
    dir: neph-cli
    cmds:
      - npm test -- --run

  test:pi:
    dir: pi
    cmds:
      - npx vitest --run

  lint:
    deps: [lint:neph, lint:pi]

  lint:neph:
    dir: neph-cli
    cmds:
      - npx tsc --noEmit

  lint:pi:
    dir: pi
    cmds:
      - npx tsc --noEmit

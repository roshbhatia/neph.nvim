version: "3"

tasks:
  test:
    deps: [test:neph, test:pi]

  test:neph:
    dir: neph-cli
    cmds:
      - npm test -- --run

  test:pi:
    dir: pi
    cmds:
      - npm test

  lint:
    deps: [lint:neph, lint:pi]

  lint:neph:
    dir: neph-cli
    cmds:
      - npx tsc --noEmit

  lint:pi:
    dir: pi
    cmds:
      - deno lint pi.ts

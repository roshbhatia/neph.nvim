version: "3"

tasks:
  test:
    deps: [test:neph, test:lib]

  test:neph:
    dir: neph-cli
    cmds:
      - npm test -- --run

  test:lib:
    dir: lib
    cmds:
      - npx vitest --run

  lint:
    deps: [lint:neph, lint:pi]

  lint:neph:
    dir: neph-cli
    cmds:
      - npx tsc --noEmit

  lint:pi:
    dir: pi
    cmds:
      - deno lint pi.ts

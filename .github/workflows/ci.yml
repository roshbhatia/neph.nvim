name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript tools: lint + unit tests ─────────────────────────────────────
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Install Cupcake
        continue-on-error: true
        run: curl -fsSL https://get.eqtylab.io/cupcake | bash
      - name: Build and test TS tools
        run: |
          nix develop -c bash -c '
            set -euo pipefail
            npm ci --prefix tools/neph-cli
            npm ci --prefix tools/pi
            task tools:build
            task lint
            task tools:test
          '

  # ── Hook sandbox e2e: no Neovim, no Cupcake, pure CLI contract ──────────────
  hook-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/neph-cli/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix tools/neph-cli
      - name: Run hook sandbox e2e tests
        run: cd tools/neph-cli && npx vitest run tests/integration/hook-sandbox.test.ts
        env:
          NVIM: ""
          NVIM_SOCKET_PATH: ""

  # ── Lua tests: run against stable and nightly Neovim ────────────────────────
  lua-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim_version: [stable, nightly]
    name: lua-tests (${{ matrix.nvim_version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Neovim ${{ matrix.nvim_version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}

      - name: Install plenary.nvim
        run: |
          # minimal_init.lua expects plenary at stdpath("data")/lazy/plenary.nvim
          # On Linux that resolves to ~/.local/share/nvim/lazy/plenary.nvim
          PLENARY_DIR="${HOME}/.local/share/nvim/lazy/plenary.nvim"
          mkdir -p "$(dirname "$PLENARY_DIR")"
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim.git "$PLENARY_DIR"

      - name: Build TypeScript tools (best-effort)
        continue-on-error: true
        run: bash scripts/build.sh --no-install

      - name: Run Lua tests
        run: |
          OUTPUT=$(nvim --headless \
            -u tests/minimal_init.lua \
            -c "lua require('plenary.test_harness').test_directory('tests/', {minimal_init='tests/minimal_init.lua', sequential=true})" \
            2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | grep -qP "Failed\s*:\s*[1-9]|Errors\s*:\s*[1-9]"; then
            echo "::error::Lua tests reported failures or errors"
            exit 1
          fi

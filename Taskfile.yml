version: "3"

includes:
  tools:
    taskfile: tools/Taskfile.yml
    dir: tools

tasks:
  lint:
    cmds:
      - stylua --check lua/ tests/
      - luacheck lua/ tests/ --globals vim Snacks describe it before_each after_each assert
      - task tools:lint

  test:
    cmds:
      - |
        nvim --headless \
          --cmd 'set rtp+=.' \
          --cmd "set rtp+=${PLENARY_PATH:-~/.local/share/nvim/lazy/plenary.nvim}" \
          -c "PlenaryBustedDirectory tests/ {minimal_init='tests/minimal_init.lua'}" \
          -c 'qa!'
      - task tools:test
      - task test:e2e

  test:e2e:
    desc: Run e2e tests (headless neovim smoke + agent launch)
    cmds:
      - nvim --headless --cmd 'set rtp+=.' -l tests/e2e/run.lua
      - bash tests/e2e/agent_launch.sh

  build:
    desc: Build all companion tools (neph-cli, pi extension)
    cmds:
      - task tools:build

  install:
    desc: Install (symlink) all bundled tools (neph, pi)
    cmds:
      - task build
      - |
        nvim --headless --cmd 'set rtp+=.' \
          -c "lua require('neph').setup({ agents = { require('neph.agents.pi') }, backend = require('neph.backends.snacks') })" \
          -c "lua require('neph.tools').install()" \
          -c 'qa!'

  check:
    desc: Fast local lint + type check (no tests, no builds)
    cmds:
      - stylua --check lua/ tests/
      - cmd: luacheck lua/ tests/ --globals vim Snacks describe it before_each after_each assert
        ignore_error: true
      - task: tools:lint:neph

  ci:
    desc: Run lint + test
    cmds:
      - task lint
      - task test

  docs:
    desc: Generate vimdoc from EmmyLua annotations
    cmds:
      - nvim --headless -u NONE -l scripts/docgen.lua

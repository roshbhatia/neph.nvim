# Taskfile.yml — neph.nvim development task runner (https://taskfile.dev)
#
# Common workflows:
#   task check          Fast lint + type check, no tests (good for save-on-change)
#   task lint           Full lint: stylua formatting + luacheck + tools TSC
#   task test           Full test suite: Lua (plenary/busted) + TS (vitest) + Rego + e2e
#   task ci             lint + test (what CI runs)
#   task build          Compile all TypeScript tools to dist/
#   task install        Build + symlink tools into agent config dirs
#   task docs           Regenerate vimdoc from EmmyLua annotations
#
# Tool sub-tasks live in tools/Taskfile.yml and are namespaced as `tools:*`
# e.g. `task tools:build`, `task tools:test`, `task tools:lint`

version: "3"

includes:
  tools:
    taskfile: tools/Taskfile.yml
    dir: tools

tasks:
  lint:
    desc: Run all linters (stylua + luacheck + tools TSC)
    cmds:
      - stylua --check lua/ tests/  # Check Lua code formatting
      - luacheck lua/ tests/ --globals vim Snacks describe it before_each after_each assert  # Lint Lua code
      - task tools:lint  # Run linters for tools

  test:
    desc: Run full test suite (Lua plenary/busted + TS vitest + Rego + e2e)
    cmds:
      - |
        nvim --headless \
          --cmd 'set rtp+=.' \
          --cmd "set rtp+=${PLENARY_PATH:-~/.local/share/nvim/lazy/plenary.nvim}" \
          -c "PlenaryBustedDirectory tests/ {minimal_init='tests/minimal_init.lua'}" \
          -c 'qa!'  # Run Lua tests using plenary.nvim
      - task tools:test  # Run TypeScript tests for tools
      - task test:rego  # Run Rego policy tests
      - task test:e2e  # Run end-to-end tests

  test:rego:
    desc: Run OPA Rego policy tests
    cmds:
      - PATH="$HOME/.cupcake/bin:$PATH" opa test .cupcake/policies/neph/ -v

  test:e2e:
    desc: Run e2e tests (headless neovim smoke + agent launch)
    cmds:
      - nvim --headless --cmd 'set rtp+=.' -l tests/e2e/run.lua  # Run headless Neovim tests
      - bash tests/e2e/agent_launch.sh  # Run agent launch tests

  test:e2e:review:
    desc: Run neph-cli review integration tests
    dir: tools/neph-cli
    cmds:
      - npx vitest run tests/integration/

  test:e2e:hooks:
    desc: Sandbox e2e tests for hook handlers and integration toggle (no Neovim required)
    dir: tools/neph-cli
    cmds:
      - npx vitest run tests/integration/hook-sandbox.test.ts

  test:e2e:tui:
    desc: PTY-based review UI smoke test via tui-use (requires tui-use daemon)
    cmds:
      - bash tests/e2e/review_tui_smoke.sh

  test:e2e:multiprocess:
    desc: Multi-process headless e2e smoke test (hook → socket → Neovim RPC)
    cmds:
      - bash tests/e2e/multiprocess_smoke.sh

  build:
    desc: Build all companion tools and install the neph CLI symlink
    cmds:
      - bash scripts/build.sh  # Compile all TS packages and install ~/.local/bin/neph

  install:
    desc: Install (symlink) all bundled tools (neph, pi)
    cmds:
      - task build  # Build the tools
      - |
        nvim --headless --cmd 'set rtp+=.' \
          -c "lua require('neph').setup({ agents = { require('neph.agents.pi') }, backend = require('neph.backends.snacks') })" \
          -c "lua require('neph.tools').install()" \
          -c 'qa!'  # Install the tools by setting up Neovim and running the installation script

  check:
    desc: Fast local lint + type check (no tests, no builds)
    cmds:
      - stylua --check lua/ tests/  # Check Lua code formatting
      - cmd: luacheck lua/ tests/ --globals vim Snacks describe it before_each after_each assert
        ignore_error: true  # Lint Lua code, ignore errors
      - task: tools:lint:neph  # Run linters for neph-cli

  ci:
    desc: Run lint + test
    cmds:
      - task lint  # Run all linters
      - task test  # Run all tests

  docs:
    desc: Generate vimdoc from EmmyLua annotations
    cmds:
      - nvim --headless -u NONE -l scripts/docgen.lua  # Generate vimdoc documentation from EmmyLua annotations
